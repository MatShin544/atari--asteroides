<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asteroids</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="menu">
        <h1>ASTEROIDS</h1>
        
        <div class="option-group">
            <h3>🎮 Controles</h3>
            <label><input type="radio" name="controls" value="keyboard" checked> Setinhas + Espaço (Atirar)</label>
            <label><input type="radio" name="controls" value="mouse"> Mouse (Mira + Clique Esq) + Direito (Acelerar)</label>
        </div>

        <div class="option-group">
            <h3>🔥 Dificuldade</h3>
            <label><input type="radio" name="difficulty" value="easy"> Fácil (Nivel Rosseti)</label>
            <label><input type="radio" name="difficulty" value="medium" checked> Médio</label>
            <label><input type="radio" name="difficulty" value="hard"> Difícil</label>
        </div>

        <button id="startBtn">START GAME</button>
    </div>

    <canvas id="gameCanvas"></canvas>
    <script src="script.js"></script>
</body>
</html>
